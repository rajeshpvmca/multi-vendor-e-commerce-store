<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00529B;
            --secondary-color: #FFA000;
            --dark-bg: #0a192f;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #020c1b 0%, var(--primary-color) 100%);
            overflow: hidden;
            position: relative;
            color: white;
        }

        /* Floating Background Icons */
        .bg-icons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-icon {
            position: absolute;
            color: rgba(255, 255, 255, 0.05);
            animation: float-icon linear infinite;
        }

        .icon-1 { font-size: 8rem; top: 10%; left: 10%; animation-duration: 25s; }
        .icon-2 { font-size: 12rem; top: 60%; left: 5%; animation-duration: 35s; animation-direction: reverse; color: rgba(255, 160, 0, 0.03); }
        .icon-3 { font-size: 6rem; top: 20%; right: 15%; animation-duration: 20s; }
        .icon-4 { font-size: 15rem; bottom: -5%; right: 5%; animation-duration: 40s; color: rgba(255, 255, 255, 0.02); }
        .icon-5 { font-size: 5rem; top: 50%; left: 30%; animation-duration: 18s; }
        .icon-6 { font-size: 7rem; bottom: 20%; left: 40%; animation-duration: 30s; animation-direction: reverse; }
        .icon-7 { font-size: 9rem; top: 30%; right: 35%; animation-duration: 22s; color: rgba(255, 160, 0, 0.04); }

        @keyframes float-icon {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* Glassmorphism Container */
        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 4rem 3rem;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            max-width: 650px;
            width: 90%;
            animation: scale-up 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes scale-up {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .error-illustration {
            font-size: 5rem;
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 15px rgba(255, 160, 0, 0.5));
            display: inline-block;
            animation: shake 3s infinite ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        .error-code {
            font-size: 160px;
            font-weight: 900;
            line-height: 1;
            margin: 0;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 10px 30px rgba(0, 0, 0, 0.3);
            letter-spacing: -5px;
        }

        .error-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff, var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-desc {
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Modern Buttons */
        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-glow {
            position: relative;
            padding: 14px 35px;
            border-radius: 50rem;
            font-weight: 700;
            font-size: 1.05rem;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
            z-index: 1;
        }

        .btn-home {
            background-color: var(--secondary-color);
            color: #000;
            border: none;
            box-shadow: 0 10px 25px rgba(255, 160, 0, 0.4);
        }

        .btn-home::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(255,255,255,0.2), transparent);
            z-index: -1;
            transition: opacity 0.3s;
        }

        .btn-home:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 160, 0, 0.6);
            color: #000;
        }

        .btn-back {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .error-code { font-size: 120px; }
            .error-title { font-size: 1.8rem; }
            .error-container { padding: 3rem 2rem; border-radius: 30px; }
        }

        @media (max-width: 576px) {
            .error-code { font-size: 100px; letter-spacing: -2px; }
            .error-title { font-size: 1.4rem; }
            .error-desc { font-size: 1rem; margin-bottom: 2rem; }
            .error-container { padding: 2.5rem 1.5rem; }
            .actions { flex-direction: column; gap: 15px; }
            .btn-glow { width: 100%; justify-content: center; }
            .error-illustration { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <!-- Floating Background Icons for E-commerce Theme -->
    <div class="bg-icons">
        <i class="fas fa-shopping-cart bg-icon icon-1"></i>
        <i class="fas fa-box-open bg-icon icon-2"></i>
        <i class="fas fa-tags bg-icon icon-3"></i>
        <i class="fas fa-store bg-icon icon-4"></i>
        <i class="fas fa-truck bg-icon icon-5"></i>
        <i class="fas fa-heart bg-icon icon-6"></i>
        <i class="fas fa-gift bg-icon icon-7"></i>
    </div>

    <!-- Main Content -->
    <div class="error-container">
        <div class="error-illustration">
            <i class="fas fa-unlink"></i>
        </div>
        
        <h1 class="error-code">404</h1>
        <h3 class="error-title">Page Not Found</h3>
        
        <p class="error-desc">
            The page or product you are looking for seems to have gone missing. It might have been moved, deleted, or you may have mistyped the address.
        </p>
        
        <div class="actions">
            <a href="javascript:history.back()" class="btn-glow btn-back">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
            <a href="index.html" class="btn-glow btn-home">
                <i class="fas fa-home"></i> Back to Home
            </a>
        </div>
    </div>

</body>
</html>
