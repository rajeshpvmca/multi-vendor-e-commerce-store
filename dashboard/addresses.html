<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Addresses - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00529B;
            --secondary: #e52e71;
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0,82,155,0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(229,46,113,0.4) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .btn {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 46, 113, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My Addresses</h1>
            <p>Manage your shipping and billing addresses</p>
        </div>
        
        <div class="glass-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>Saved Addresses</h2>
                <button class="btn">+ Add New Address</button>
            </div>
            
            <div class="grid">
                <!-- Address Card 1 -->
                <div class="glass-panel" style="padding: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <span style="background: rgba(0,82,155,0.3); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.875rem;">Home</span>
                        <div style="cursor:pointer; color: #cbd5e1; font-size: 1.2rem;">⋮</div>
                    </div>
                    <h3 style="margin-bottom: 0.5rem;">John Doe</h3>
                    <p style="color: #cbd5e1; font-size: 0.95rem; line-height: 1.5;">
                        123 Web Dev Lane<br>
                        Apt 4B<br>
                        San Francisco, CA 94105<br>
                        United States
                    </p>
                    <p style="color: #cbd5e1; font-size: 0.95rem; margin-top: 1rem;">
                        📞 +1 (555) 123-4567
                    </p>
                </div>

                <!-- Address Card 2 -->
                <div class="glass-panel" style="padding: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <span style="background: rgba(229,46,113,0.3); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.875rem;">Work</span>
                        <div style="cursor:pointer; color: #cbd5e1; font-size: 1.2rem;">⋮</div>
                    </div>
                    <h3 style="margin-bottom: 0.5rem;">John Doe</h3>
                    <p style="color: #cbd5e1; font-size: 0.95rem; line-height: 1.5;">
                        456 Corporate Blvd<br>
                        Suite 100<br>
                        New York, NY 10001<br>
                        United States
                    </p>
                    <p style="color: #cbd5e1; font-size: 0.95rem; margin-top: 1rem;">
                        📞 +1 (555) 987-6543
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button:not([disabled])').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(!btn.hasAttribute('data-bs-toggle')){
                    e.preventDefault();
                    window.top.location.href = '../404.html';
                }
            });
        });
    });
    </script>
</body>
</html>
