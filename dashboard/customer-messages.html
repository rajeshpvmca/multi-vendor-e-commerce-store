<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            color: #fff;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .chat-container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            height: 80vh;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .sidebar {
            width: 300px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            overflow-y: auto;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .contact {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: background 0.2s;
        }
        .contact:hover, .contact.active {
            background: rgba(255, 255, 255, 0.1);
        }
        .contact-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .contact-preview {
            font-size: 0.8rem;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.1);
            font-weight: 600;
            font-size: 1.2rem;
        }
        .messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .msg {
            max-width: 70%;
            padding: 1rem;
            border-radius: 16px;
            font-size: 0.95rem;
        }
        .msg.received {
            background: rgba(255, 255, 255, 0.1);
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        .msg.sent {
            background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .chat-input {
            padding: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.2);
        }
        .chat-input input {
            flex: 1;
            padding: 1rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            outline: none;
        }
        .btn-send {
            background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
            border: none;
            border-radius: 24px;
            padding: 0 2rem;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-send:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="contact active">
                <div class="contact-name">Alice Smith</div>
                <div class="contact-preview">Is the item still available?</div>
            </div>
            <div class="contact">
                <div class="contact-name">John Doe</div>
                <div class="contact-preview">Thanks for the update!</div>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-header">Alice Smith</div>
            <div class="messages">
                <div class="msg received">Hi, is the Premium Wireless Headphone still available?</div>
                <div class="msg sent">Hello Alice! Yes, we currently have 2 left in stock.</div>
            </div>
            <div class="chat-input">
                <input type="text" placeholder="Type your message...">
                <button class="btn-send">Send</button>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button:not([disabled])').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(!btn.hasAttribute('data-bs-toggle')){
                    e.preventDefault();
                    window.top.location.href = '../404.html';
                }
            });
        });
    });
    </script>
</body>

</html>
