<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Earnings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981;
            --bg-color: #0F172A;
            --card-bg: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); padding: 2rem; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 2rem; }
        h1 { font-size: 2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-muted); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: linear-gradient(135deg, var(--card-bg), #273852); padding: 1.5rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); }
        .stat-label { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 600; color: var(--primary); }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 1rem; }
        h2 { font-size: 1.25rem; font-weight: 500; margin-bottom: 1rem; }
        .payout-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 0.5rem; margin-bottom: 0.5rem; }
        .payout-info { display: flex; flex-direction: column; }
        .payout-date { font-weight: 500; }
        .payout-type { color: var(--text-muted); font-size: 0.85rem; }
        .payout-amount { font-weight: 600; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Earnings Overview</h1>
            <p class="subtitle">Track your payouts and tips</p>
        </header>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Today's Earnings</div>
                <div class="stat-value">$142.50</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tips (This Week)</div>
                <div class="stat-value">$85.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Deliveries</div>
                <div class="stat-value">24</div>
            </div>
        </div>
        <div class="card">
            <h2>Recent Payouts</h2>
            <div class="payout-item">
                <div class="payout-info">
                    <span class="payout-date">Jul 06, 2026</span>
                    <span class="payout-type">Delivery + Tip</span>
                </div>
                <span class="payout-amount">$18.50</span>
            </div>
            <div class="payout-item">
                <div class="payout-info">
                    <span class="payout-date">Jul 06, 2026</span>
                    <span class="payout-type">Delivery</span>
                </div>
                <span class="payout-amount">$12.00</span>
            </div>
            <div class="payout-item">
                <div class="payout-info">
                    <span class="payout-date">Jul 05, 2026</span>
                    <span class="payout-type">Daily Bonus</span>
                </div>
                <span class="payout-amount">$25.00</span>
            </div>
        </div>
    </div>
   
</body>
</html>
