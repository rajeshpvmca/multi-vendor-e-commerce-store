<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #fff;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        h1 {
            background: linear-gradient(90deg, #f2c94c 0%, #f2994a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }
        .alert {
            background: rgba(255, 59, 48, 0.2);
            border-left: 4px solid #ff3b30;
            padding: 1rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            color: #aaa;
            font-weight: 600;
        }
        .btn {
            background: linear-gradient(90deg, #f2c94c 0%, #f2994a 100%);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inventory Management</h1>
        <div class="alert">
            <span><strong>Low Stock Alert:</strong> 3 items are running out of stock!</span>
            <button class="btn">View Items</button>
        </div>
        <div class="glass-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>All Products</h2>
                <button class="btn" style="background: rgba(255,255,255,0.1); color: #fff;">Bulk Update</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>SKU</th>
                            <th>Stock Level</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Premium Wireless Headphones</td>
                            <td>WH-1002</td>
                            <td style="color: #ff3b30;">2 left</td>
                            <td>Low Stock</td>
                            <td><button class="btn" style="padding: 0.25rem 0.75rem; font-size: 0.8rem;">Restock</button></td>
                        </tr>
                        <tr>
                            <td>Ergonomic Office Chair</td>
                            <td>OC-4491</td>
                            <td style="color: #34c759;">45 left</td>
                            <td>In Stock</td>
                            <td><button class="btn" style="padding: 0.25rem 0.75rem; font-size: 0.8rem; background: rgba(255,255,255,0.1); color: #fff;">Edit</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button:not([disabled])').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(!btn.hasAttribute('data-bs-toggle')){
                    e.preventDefault();
                    window.top.location.href = '../404.html';
                }
            });
        });
    });
    </script>
</body>

</html>
