<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Settings | Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #2b1055, #7597de);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 {
            margin-top: 0;
            font-weight: 700;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 400;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }
        .toggle-switch.active {
            background: #4ade80;
        }
        .toggle-switch.active::after {
            transform: translateX(24px);
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 2rem;
            background: linear-gradient(90deg, #ff8a00, #e52e71);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 46, 113, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <h1>Platform Settings</h1>
            
            <form id="settingsForm">
                <!-- Tax Rates -->
                <div class="form-group">
                    <div class="section-title">Tax Rates</div>
                    <label for="baseTax">Base Tax Rate (%)</label>
                    <input type="number" id="baseTax" placeholder="e.g., 5.0" step="0.1">
                </div>

                <!-- Global Config -->
                <div class="form-group" style="margin-top: 2rem;">
                    <div class="section-title">Global Configuration</div>
                    <label for="siteName">Platform Name</label>
                    <input type="text" id="siteName" placeholder="Enter platform name">
                    
                    <label for="contactEmail" style="margin-top: 1rem;">Support Email</label>
                    <input type="text" id="contactEmail" placeholder="support@example.com">
                </div>

                <!-- Maintenance Toggles -->
                <div class="form-group" style="margin-top: 2rem;">
                    <div class="section-title">Maintenance Mode</div>
                    <div class="toggle-container">
                        <div class="toggle-switch" id="maintenanceToggle" onclick="this.classList.toggle('active')"></div>
                        <span>Enable Maintenance Mode (Platform offline)</span>
                    </div>
                </div>

                <button type="button" class="btn-submit">Save Settings</button>
            </form>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button:not([disabled])').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(!btn.hasAttribute('data-bs-toggle')){
                    e.preventDefault();
                    window.top.location.href = '../404.html';
                }
            });
        });
    });
    </script>
</body>

</html>
