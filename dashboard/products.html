<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { padding: 1.5rem; background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .dash-card { border: none; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .text-primary-theme { color: var(--primary-color) !important; }
        .btn-primary-theme { background-color: var(--primary-color) !important; color: #fff; border: none; }
        .badge-stock { padding: 5px 10px; border-radius: 6px; font-weight: 600; }
        .stock-in { background-color: rgba(25, 135, 84, 0.1); color: #198754; }
        .stock-low { background-color: rgba(255, 160, 0, 0.1); color: var(--secondary-color); }
        .stock-out { background-color: rgba(220, 53, 69, 0.1); color: #dc3545; }
        .product-img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; }
        .table > :not(caption) > * > * { padding: 1rem; border-bottom-color: #f1f1f1; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0 text-primary-theme">My Products</h3>
            <button class="btn btn-primary-theme rounded-pill px-4 fw-bold"><i class="fas fa-plus me-2"></i>Add Product</button>
        </div>
        
        <div class="card dash-card">
            <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                <div class="input-group" style="width: 300px;">
                    <span class="input-group-text bg-light border-0"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" class="form-control bg-light border-0" placeholder="Search products...">
                </div>
                <div class="d-flex gap-2">
                    <select class="form-select border-0 bg-light rounded-pill">
                        <option>All Categories</option>
                        <option>Electronics</option>
                        <option>Clothing</option>
                        <option>Home</option>
                    </select>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="text-muted small border-0 px-4">Product Name</th>
                                <th class="text-muted small border-0">Category</th>
                                <th class="text-muted small border-0">Price</th>
                                <th class="text-muted small border-0">Stock</th>
                                <th class="text-muted small border-0">Status</th>
                                <th class="text-muted small border-0 px-4 text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="px-4">
                                    <div class="d-flex align-items-center">
                                        <img src="../assets/images/img_023.webp" class="product-img me-3" alt="Headphones">
                                        <div>
                                            <h6 class="fw-bold mb-0">Wireless Headphones</h6>
                                            <span class="text-muted small">SKU: WH-001</span>
                                        </div>
                                    </div>
                                </td>
                                <td>Electronics</td>
                                <td class="fw-bold">$249.99</td>
                                <td>45 units</td>
                                <td><span class="badge-stock stock-in">In Stock</span></td>
                                <td class="px-4 text-end">
                                    <button class="btn btn-sm btn-light text-primary-theme me-1"><i class="fas fa-edit"></i></button>
                                    <button class="btn btn-sm btn-light text-danger"><i class="fas fa-trash-alt"></i></button>
                                </td>
                            </tr>
                            <tr>
                                <td class="px-4">
                                    <div class="d-flex align-items-center">
                                        <img src="../assets/images/img_037.webp" class="product-img me-3" alt="Sneakers">
                                        <div>
                                            <h6 class="fw-bold mb-0">Running Sneakers</h6>
                                            <span class="text-muted small">SKU: RS-042</span>
                                        </div>
                                    </div>
                                </td>
                                <td>Clothing</td>
                                <td class="fw-bold">$129.99</td>
                                <td>5 units</td>
                                <td><span class="badge-stock stock-low">Low Stock</span></td>
                                <td class="px-4 text-end">
                                    <button class="btn btn-sm btn-light text-primary-theme me-1"><i class="fas fa-edit"></i></button>
                                    <button class="btn btn-sm btn-light text-danger"><i class="fas fa-trash-alt"></i></button>
                                </td>
                            </tr>
                            <tr>
                                <td class="px-4">
                                    <div class="d-flex align-items-center">
                                       <img src="../assets/images/img_038.webp" class="product-img me-3" alt="Ergonomic Chair">
                                        <div>
                                            <h6 class="fw-bold mb-0">Ergonomic Chair</h6>
                                            <span class="text-muted small">SKU: EC-999</span>
                                        </div>
                                    </div>
                                </td>
                                <td>Home & Office</td>
                                <td class="fw-bold">$89.50</td>
                                <td>0 units</td>
                                <td><span class="badge-stock stock-out">Out of Stock</span></td>
                                <td class="px-4 text-end">
                                    <button class="btn btn-sm btn-light text-primary-theme me-1"><i class="fas fa-edit"></i></button>
                                    <button class="btn btn-sm btn-light text-danger"><i class="fas fa-trash-alt"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white border-0 py-3 text-center">
                <p class="text-muted small mb-0">Showing 1-3 of 24 products</p>
            </div>
        </div>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button, a.btn, .action-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                window.top.location.href = '../404.html';
            });
        });
    });
</script>
</body>
</html>
