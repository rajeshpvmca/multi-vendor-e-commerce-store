<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Stackly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { 
            padding: 2rem; 
            background-color: transparent; 
            font-family: 'Outfit', sans-serif; 
        }

        /* Typography */
        .text-primary-theme { color: var(--primary-color) !important; }
        .text-secondary-theme { color: var(--secondary-color) !important; }

        /* Premium Profile Card (New Design) */
        .premium-profile-card {
            position: relative;
            border-radius: 24px;
            margin-bottom: 3rem;
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(0, 82, 155, 0.15);
            overflow: hidden;
            background: #fff;
        }

        .premium-profile-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            z-index: 0;
        }

        .premium-profile-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23ffffff" fill-opacity="0.1"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
            opacity: 0.5;
        }

        .profile-content-wrapper {
            position: relative;
            z-index: 2;
        }

        /* Avatar Container */
        .premium-avatar-wrap {
            position: relative;
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }
        
        .premium-avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 4px solid rgba(255, 255, 255, 0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 800; color: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        .avatar-badge {
            position: absolute;
            bottom: 5px; right: 5px;
            width: 32px; height: 32px;
            background: #10b981;
            border: 3px solid #fff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Profile Info */
        .profile-user-name {
            font-size: 2.2rem; font-weight: 800; color: #fff; margin-bottom: 0.2rem;
            text-transform: capitalize; letter-spacing: -0.5px;
        }
        
        .profile-role-badge {
            background: rgba(255, 255, 255, 0.9);
            color: var(--primary-color);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem; font-weight: 700;
            display: inline-block;
            margin-bottom: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .profile-meta {
            display: flex; flex-wrap: wrap; gap: 1.2rem; color: rgba(255,255,255,0.85);
            font-size: 0.95rem; font-weight: 500;
        }
        .profile-meta i { color: rgba(255,255,255,0.6); margin-right: 6px; }

        /* Stats Boxes */
        .profile-stats-container {
            display: flex; gap: 1rem;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            text-align: center;
            color: #fff;
            min-width: 100px;
            transition: transform 0.3s ease;
        }
        .stat-box:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
        }
        .stat-value { font-size: 1.8rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; font-weight: 600; }

        /* Premium Cards */
        .content-card {
            background: #fff;
            border-radius: 20px;
            border: none;
            padding: 2.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            margin-bottom: 2rem;
        }
        .content-card-title {
            font-size: 1.25rem; font-weight: 700; color: #111; margin-bottom: 1.5rem;
            padding-bottom: 1rem; border-bottom: 1px solid #f3f4f6;
        }

        /* Form Inputs */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        .form-label-dash { font-weight: 600; color: #4b5563; font-size: 0.9rem; margin-bottom: 8px; display: block; }
        
        .form-ctrl {
            border: 2px solid #e5e7eb !important;
            border-radius: 12px !important;
            padding: 0.85rem 1.2rem !important;
            font-size: 0.95rem !important;
            font-family: 'Outfit', sans-serif !important;
            background: #fff !important;
            transition: all 0.3s ease !important;
            width: 100%;
            color: #111;
        }
        .form-ctrl:focus {
            border-color: var(--primary-color) !important;
            box-shadow: 0 4px 15px rgba(0, 82, 155, 0.08) !important;
            outline: none !important;
        }
        .form-ctrl:read-only {
            background: #f9fafb !important;
            color: #9ca3af;
            cursor: not-allowed;
            border-color: #f3f4f6 !important;
        }

        /* Buttons */
        .btn-primary-theme { 
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)) !important; 
            color: #fff !important; border: none; padding: 12px 28px; border-radius: 50rem; 
            font-weight: 600; font-size: 1rem; transition: all 0.3s; 
            box-shadow: 0 4px 15px rgba(229, 46, 113, 0.2);
        }
        .btn-primary-theme:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(229, 46, 113, 0.4); }
        
        .btn-outline-theme { 
            background-color: transparent !important; color: var(--primary-color) !important; 
            border: 2px solid var(--primary-color) !important; padding: 10px 28px; border-radius: 50rem; 
            font-weight: 600; font-size: 1rem; transition: all 0.3s; 
        }
        .btn-outline-theme:hover { background-color: var(--primary-color) !important; color: #fff !important; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 82, 155, 0.2); }

        /* Password Strength */
        .password-field-wrapper { position: relative; }
        .password-field-wrapper .form-ctrl { padding-right: 48px !important; }
        .eye-toggle-btn {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: transparent; border: none; color: #9ca3af; padding: 6px; cursor: pointer;
            z-index: 10; display: flex; align-items: center; justify-content: center; transition: color 0.3s ease;
        }
        .eye-toggle-btn:hover { color: var(--primary-color); }

        @media (max-width: 992px) {
            .profile-content-wrapper { flex-direction: column; text-align: center; }
            .profile-meta { justify-content: center; }
            .profile-stats-container { justify-content: center; width: 100%; margin-top: 1rem; }
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .form-row { grid-template-columns: 1fr; gap: 1rem; }
            .content-card { padding: 1.5rem; }
            .premium-profile-card { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        
        <!-- Totally New Premium Profile Card -->
        <div class="premium-profile-card">
            <div class="premium-profile-bg"></div>
            
            <div class="profile-content-wrapper d-flex align-items-center gap-4">
                
                <!-- Avatar -->
                <div class="premium-avatar-wrap">
                    <div class="premium-avatar" id="profileAvatar">U</div>
                    <div class="avatar-badge" title="Verified Account"><i class="fas fa-check"></i></div>
                </div>

                <!-- Info -->
                <div class="flex-grow-1 text-center text-lg-start">
                    <h1 class="profile-user-name" id="displayProfileName">User Name</h1>
                    <div class="profile-role-badge" id="profileRole">Customer</div>
                    
                    <div class="profile-meta">
                        <div><i class="fas fa-envelope"></i> <span id="displayEmail">email@example.com</span></div>
                        <div><i class="fas fa-map-marker-alt"></i> <span id="displayCountry">United States</span></div>
                        <div><i class="fas fa-calendar-alt"></i> Joined 2023</div>
                    </div>
                </div>

                <!-- Stats / Glassmorphism -->
                <div class="profile-stats-container">
                    <div class="stat-box">
                        <div class="stat-value">12</div>
                        <div class="stat-label">Orders</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value">5</div>
                        <div class="stat-label">Wishlist</div>
                    </div>
                </div>

            </div>
        </div>

        <div class="row">
            <!-- Personal Info Form -->
            <div class="col-lg-12">
                <div class="content-card">
                    <div class="content-card-title d-flex align-items-center gap-2"><i class="fas fa-user-circle text-primary-theme"></i> Personal Information</div>
                    <form onsubmit="saveProfile(event)">
                        <div class="form-row">
                            <div>
                                <label class="form-label-dash">Full Name</label>
                                <input type="text" class="form-ctrl" id="editName" placeholder="Full Name" pattern="[A-Za-z\s]+" oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')">
                            </div>
                            <div>
                                <label class="form-label-dash">Email Address</label>
                                <input type="email" class="form-ctrl" id="editEmail" placeholder="email@example.com" readonly>
                            </div>
                            <div>
                                <label class="form-label-dash">Phone Number</label>
                                <input type="tel" class="form-ctrl" id="editPhone" placeholder="Your Number" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);">
                            </div>
                            <div>
                                <label class="form-label-dash">Country</label>
                                <input type="text" class="form-ctrl" id="editCountry" placeholder="Your country">
                            </div>
                        </div>
                        <div class="text-end mt-4">
                            <button type="submit" class="btn-outline-theme"><i class="fas fa-save me-2"></i>Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Change Password Form -->
            <div class="col-lg-12">
                <div class="content-card">
                    <div class="content-card-title d-flex align-items-center gap-2"><i class="fas fa-shield-alt text-primary-theme"></i> Change Password</div>
                    <div class="form-row">
                        <div>
                            <label class="form-label-dash">New Password</label>
                            <div class="password-field-wrapper">
                                <input type="password" class="form-ctrl" id="newPassword" placeholder="New password" minlength="8">
                                <button class="eye-toggle-btn toggle-password" type="button"><i class="fas fa-eye"></i></button>
                            </div>
                            <div class="mt-2" style="height:6px;border-radius:6px;background:#f3f4f6;overflow:hidden;">
                                <div id="strengthBar" style="height:100%;width:0;transition:width 0.3s, background 0.3s; border-radius:6px;"></div>
                            </div>
                        </div>
                        <div>
                            <label class="form-label-dash">Confirm Password</label>
                            <div class="password-field-wrapper">
                                <input type="password" class="form-ctrl" id="confirmNewPassword" placeholder="Confirm new password">
                                <button class="eye-toggle-btn toggle-password" type="button"><i class="fas fa-eye"></i></button>
                            </div>
                            <div id="matchMsg" class="mt-2 fw-medium" style="font-size:0.85rem;min-height:1.2rem;"></div>
                        </div>
                    </div>
                    <div class="text-end mt-4">
                        <button type="button" onclick="updatePassword()" class="btn-primary-theme"><i class="fas fa-lock me-2"></i>Update Password</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use default values if localstorage is empty to ensure UI is visible for preview
        let user = JSON.parse(localStorage.getItem('loggedInUser'));
        if (!user) {
            user = { name: 'Demo User', email: 'demo@example.com', role: 'Customer', phone: '1234567890', country: 'United States' };
        }
        
        document.getElementById('profileAvatar').textContent = user.name.charAt(0).toUpperCase();
        document.getElementById('displayProfileName').textContent = user.name;
        document.getElementById('profileRole').textContent = user.role;
        document.getElementById('displayEmail').textContent = user.email;
        document.getElementById('displayCountry').textContent = user.country || 'United States';
        
        document.getElementById('editName').value = user.name;
        document.getElementById('editEmail').value = user.email;
        document.getElementById('editPhone').value = user.phone || '';
        document.getElementById('editCountry').value = user.country || '';

        function saveProfile(e) {
            e.preventDefault();
            const newName = document.getElementById('editName').value.trim();
            const newPhone = document.getElementById('editPhone').value.trim();
            const newCountry = document.getElementById('editCountry').value.trim();

            if (newName) {
                user.name = newName;
                user.phone = newPhone;
                user.country = newCountry;
                localStorage.setItem('loggedInUser', JSON.stringify(user));
                document.getElementById('displayProfileName').textContent = newName;
                document.getElementById('displayCountry').textContent = newCountry || 'United States';
                document.getElementById('profileAvatar').textContent = newName.charAt(0).toUpperCase();
                alert('Profile updated successfully!');
            }
        }

        // Password logic matching signup page
        const newPwd = document.getElementById('newPassword');
        const confPwd = document.getElementById('confirmNewPassword');
        const sBar = document.getElementById('strengthBar');
        const mMsg = document.getElementById('matchMsg');
        
        const pwdRules = {
            'r-len': v => v.length >= 8,
            'r-upper': v => /[A-Z]/.test(v),
            'r-num': v => /[0-9]/.test(v),
            'r-sym': v => /[^A-Za-z0-9]/.test(v)
        };
        const sColors = ['#ef4444', '#f97316', '#eab308', '#10b981'];
        const sLabels = ['Weak', 'Fair', 'Good', 'Strong'];

        newPwd.addEventListener('input', () => {
            const v = newPwd.value;
            let passed = 0;
            Object.values(pwdRules).forEach(fn => { if (fn(v)) passed++; });
            sBar.style.width = (passed / 4 * 100) + '%';
            sBar.style.background = sColors[passed - 1] || '#f3f4f6';
            sBar.title = sLabels[passed - 1] || '';
            checkNewMatch();
        });

        confPwd.addEventListener('input', checkNewMatch);

        function checkNewMatch() {
            if (!confPwd.value) { mMsg.textContent = ''; return; }
            if (confPwd.value === newPwd.value) {
                mMsg.style.color = '#10b981';
                mMsg.innerHTML = '<i class="fas fa-check-circle me-1"></i>Passwords match';
            } else {
                mMsg.style.color = '#ef4444';
                mMsg.innerHTML = '<i class="fas fa-times-circle me-1"></i>Passwords do not match';
            }
        }

        function updatePassword() {
            const pwd = newPwd.value;
            const conf = confPwd.value;
            
            let passed = 0;
            Object.values(pwdRules).forEach(fn => { if (fn(pwd)) passed++; });

            if (pwd.length === 0) {
                alert('Please enter a new password.');
                return;
            }
            if (passed < 4) {
                alert('Password is not strong enough. Ensure it has 8+ characters, an uppercase letter, a number, and a symbol.');
                return;
            }
            if (pwd !== conf) {
                alert('Passwords do not match.');
                return;
            }

            const registryKey = "user_" + user.email;
            const regUser = JSON.parse(localStorage.getItem(registryKey));
            
            if (regUser) {
                regUser.password = pwd;
                localStorage.setItem(registryKey, JSON.stringify(regUser));
                alert('Password updated successfully!');
                newPwd.value = ''; confPwd.value = '';
                sBar.style.width = '0'; mMsg.textContent = '';
            } else {
                alert('Demo mode: Password updated successfully!');
                newPwd.value = ''; confPwd.value = '';
                sBar.style.width = '0'; mMsg.textContent = '';
            }
        }

        // Visibility Toggle
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                const type = input.type === 'password' ? 'text' : 'password';
                input.type = type;
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
        });
    </script>
</body>
</html>
