<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #23074d 0%, #cc5333 100%);
            color: #fff;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .glass-panel {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        h1 {
            background: linear-gradient(90deg, #ff9a9e 0%, #fecfef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #eee;
            font-weight: 300;
        }
        input, textarea {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #fecfef;
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-save {
            background: linear-gradient(90deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 1.1rem;
        }
        .btn-save:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <h1>Store Profile Customization</h1>
            <form>
                <div class="form-group">
                    <label>Store Name</label>
                    <input type="text" value="Tech Haven E-Store">
                </div>
                <div class="form-group">
                    <label>Store Description</label>
                    <textarea rows="4">Premium electronics and gadgets for the modern consumer.</textarea>
                </div>
                <div class="form-group">
                    <label>Contact Email</label>
                    <input type="email" value="vendor@techhaven.com">
                </div>
                <button type="button" class="btn-save">Save Changes</button>
            </form>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button:not([disabled])').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(!btn.hasAttribute('data-bs-toggle')){
                    e.preventDefault();
                    window.top.location.href = '../404.html';
                }
            });
        });
    });
    </script>
</body>

</html>
