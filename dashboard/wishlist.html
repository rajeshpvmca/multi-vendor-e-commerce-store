<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { padding: 1.5rem; background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .product-card { border: none; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.3s; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: 200px; object-fit: cover; }
        .text-primary-theme { color: var(--primary-color) !important; }
        .btn-primary-theme { background-color: var(--primary-color) !important; color: #fff; border: none; }
        .btn-primary-theme:hover { background-color: #003d73 !important; color: #fff; }
        .remove-btn { position: absolute; top: 10px; right: 10px; width: 35px; height: 35px; border-radius: 50%; background: white; color: #dc3545; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0 text-primary-theme">My Wishlist</h3>
            <button class="btn btn-outline-secondary rounded-pill px-4"><i class="fas fa-trash-alt me-2"></i>Clear All</button>
        </div>
        
        <div class="row g-4">
            <!-- Product 1 -->
            <div class="col-sm-6 col-lg-4 col-xl-3">
                <div class="card product-card h-100 position-relative">
                    <button class="remove-btn"><i class="fas fa-times"></i></button>
                    <img src="../assets/images/img_023.webp" class="product-img" alt="Headphones">
                    <div class="card-body d-flex flex-column">
                        <h6 class="fw-bold mb-1">Wireless Noise Cancelling Headphones</h6>
                        <p class="text-muted small mb-2">TechAudio Store</p>
                        <h5 class="fw-bold text-primary-theme mb-3">$249.99</h5>
                        <button class="btn btn-primary-theme mt-auto rounded-pill fw-bold py-2"><i class="fas fa-shopping-cart me-2"></i>Add to Cart</button>
                    </div>
                </div>
            </div>
            
            <!-- Product 2 -->
            <div class="col-sm-6 col-lg-4 col-xl-3">
                <div class="card product-card h-100 position-relative">
                    <button class="remove-btn"><i class="fas fa-times"></i></button>
                    <img src="../assets/images/img_034.webp" class="product-img" alt="Camera">
                    <div class="card-body d-flex flex-column">
                        <h6 class="fw-bold mb-1">Vintage Polaroid Camera</h6>
                        <p class="text-muted small mb-2">RetroGadgets</p>
                        <h5 class="fw-bold text-primary-theme mb-3">$120.00</h5>
                        <button class="btn btn-primary-theme mt-auto rounded-pill fw-bold py-2"><i class="fas fa-shopping-cart me-2"></i>Add to Cart</button>
                    </div>
                </div>
            </div>
            
            <!-- Product 3 -->
            <div class="col-sm-6 col-lg-4 col-xl-3">
                <div class="card product-card h-100 position-relative">
                    <button class="remove-btn"><i class="fas fa-times"></i></button>
                    <img src="../assets/images/img_035.webp" class="product-img" alt="Shoes">
                    <div class="card-body d-flex flex-column">
                        <h6 class="fw-bold mb-1">Classic Black Sneakers</h6>
                        <p class="text-muted small mb-2">UrbanKicks</p>
                        <h5 class="fw-bold text-primary-theme mb-3">$75.50</h5>
                        <button class="btn btn-primary-theme mt-auto rounded-pill fw-bold py-2"><i class="fas fa-shopping-cart me-2"></i>Add to Cart</button>
                    </div>
                </div>
            </div>
            
            <!-- Product 4 -->
            <div class="col-sm-6 col-lg-4 col-xl-3">
                <div class="card product-card h-100 position-relative">
                    <button class="remove-btn"><i class="fas fa-times"></i></button>
                     <img src="../assets/images/img_036.webp" class="product-img" alt="desk Lamp">
                    <div class="card-body d-flex flex-column">
                        <h6 class="fw-bold mb-1">Minimalist Desk Lamp</h6>
                        <p class="text-muted small mb-2">HomeDecor Essentials</p>
                        <h5 class="fw-bold text-primary-theme mb-3">$45.00 <span class="text-danger small fs-6 ms-2 text-decoration-line-through">$60.00</span></h5>
                        <button class="btn btn-primary-theme mt-auto rounded-pill fw-bold py-2"><i class="fas fa-shopping-cart me-2"></i>Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
